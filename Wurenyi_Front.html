/*# sourceMappingURL=main.css.map*/</style></head><body><div id="app"></div><style>
.jingi-locked-tab{opacity:.55;cursor:not-allowed!important;font-style:italic}
.jingi-relation-summary{display:grid;grid-template-columns:1fr;gap:5px;margin-top:2px;padding:8px 10px;background:hsla(0,0%,100%,.32);border:1px solid var(--c-line);border-left:3px solid var(--c-accent-dim)}
.jingi-relation-row{display:grid;grid-template-columns:5.5em 1fr;gap:8px;font-size:11px;line-height:1.45}
.jingi-relation-key{color:var(--c-brick-deep);font-weight:600;letter-spacing:.06em}
.jingi-relation-value{color:var(--c-ink-soft);min-width:0;overflow-wrap:anywhere}
.jingi-task-remove{margin-left:auto;padding:2px 7px;border:1px solid var(--c-line-dark);background:var(--c-paper-light);color:var(--c-brick-deep);font-family:inherit;font-size:9px;cursor:pointer;white-space:nowrap}
.jingi-task-remove:hover{background:rgba(140,31,31,.1)}
@media(max-width:560px){.jingi-relation-row{grid-template-columns:1fr;gap:1px}.jingi-task-remove{min-height:32px;padding:6px 9px}}
</style>
<script>
// 无仁义之战状态栏增强 v1.6.2
(() => {
  const LOCKED = new Set(['朝仓澪', '新桥雅代', '鹭宫绫子', '高峰千鹤']);
  const getMvuData = () => {
    try {
      const value = Mvu.getMvuData({ type: 'message', message_id: 'latest' });
      if (value?.stat_data) return value;
    } catch (_) {}
    return null;
  };
  const escapeHtml = value => String(value ?? '')
    .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
  const fallbackAttitude = role => {
    const favor = Number(role?.好感度 ?? 0);
    const dependency = Number(role?.依赖度 ?? 0);
    if (favor >= 80) return dependency >= 60 ? '公开信赖并主动依靠你' : '明显亲近，愿意站在你这一边';
    if (favor >= 60) return '保持信赖，愿意讨论私人与利益问题';
    if (favor >= 40) return '态度缓和，但仍会观察你的选择';
    if (favor >= 20) return '维持礼貌与有限合作';
    return '保持距离，尚未建立稳定信任';
  };
  const refreshLockedTabs = stat => {
    const roles = stat?.角色 ?? {};
    document.querySelectorAll('.char-selector button').forEach(button => {
      const realName = button.dataset.jingiRealName || button.textContent?.trim();
      if (!LOCKED.has(realName)) return;
      button.dataset.jingiRealName = realName;
      const unlocked = Object.prototype.hasOwnProperty.call(roles, realName);
      const nextText = unlocked ? realName : '尚未相识';
      const nextTitle = unlocked ? '' : '在剧情中相遇后解锁';
      if (button.textContent !== nextText) button.textContent = nextText;
      if (button.disabled === unlocked) button.disabled = !unlocked;
      if (button.classList.contains('jingi-locked-tab') === unlocked) {
        button.classList.toggle('jingi-locked-tab', !unlocked);
      }
      if (button.title !== nextTitle) button.title = nextTitle;
    });
  };
  const refreshRelationship = stat => {
    const info = document.querySelector('.char-info');
    const name = info?.querySelector('.char-name')?.textContent?.trim();
    const role = name ? stat?.角色?.[name] : null;
    const old = info?.querySelector('.jingi-relation-summary');
    if (!info || !role) {
      old?.remove();
      return;
    }
    const rows = [
      ['公开态度', role.公开态度 || fallbackAttitude(role)],
      ['当前矛盾', role.当前矛盾 || '暂无明确矛盾'],
      ['近期承诺', role.近期承诺 || '暂无待兑现承诺'],
    ];
    const html = rows.map(([key, value]) => '<div class="jingi-relation-row"><span class="jingi-relation-key">' + escapeHtml(key) + '</span><span class="jingi-relation-value">' + escapeHtml(value) + '</span></div>').join('');
    let panel = old;
    if (!panel) {
      panel = document.createElement('div');
      panel.className = 'jingi-relation-summary';
      const bars = info.querySelector('.char-bars');
      bars ? bars.insertAdjacentElement('afterend', panel) : info.append(panel);
    }
    if (panel.innerHTML !== html) panel.innerHTML = html;
  };
  const refreshRemoveButtons = () => {
    document.querySelectorAll('.task-list .task-card').forEach(card => {
      if (card.querySelector('.jingi-task-remove')) return;
      const name = card.querySelector('.task-name')?.textContent?.trim();
      const head = card.querySelector('.task-head');
      const list = card.closest('.task-list');
      if (!name || !head || !list) return;
      const button = document.createElement('button');
      button.type = 'button';
      button.className = 'jingi-task-remove';
      button.textContent = '移除';
      button.title = '从当前存档中手动移除此项';
      button.dataset.kind = list.classList.contains('pending') ? '待生效事件' : '任务';
      button.dataset.name = name;
      head.append(button);
    });
  };
  const refresh = () => {
    const data = getMvuData();
    const stat = data?.stat_data ?? {};
    refreshLockedTabs(stat);
    refreshRelationship(stat);
    refreshRemoveButtons();
  };
  document.addEventListener('click', async event => {
    const button = event.target.closest?.('.jingi-task-remove');
    if (!button) return;
    event.preventDefault();
    event.stopPropagation();
    const kind = button.dataset.kind;
    const name = button.dataset.name;
    if (!kind || !name || !window.confirm('确定从「' + kind + '」中移除“' + name + '”吗？')) return;
    const data = getMvuData();
    const pool = data?.stat_data?.世界?.[kind];
    if (!data || !pool || !Object.prototype.hasOwnProperty.call(pool, name)) {
      toastr.warning('该条目已经不存在');
      return;
    }
    const nextData = typeof structuredClone === 'function' ? structuredClone(data) : _.cloneDeep(data);
    delete nextData.stat_data.世界[kind][name];
    await Mvu.replaceMvuData(nextData, { type: 'message', message_id: 'latest' });
    toastr.info('已移除：' + name);
    if (typeof reloadIframe === 'function') reloadIframe();
    else window.location.reload();
  }, true);
  let refreshFrame = 0;
  const scheduleRefresh = () => {
    if (refreshFrame) return;
    refreshFrame = window.requestAnimationFrame(() => {
      refreshFrame = 0;
      refresh();
    });
  };
  const observer = new MutationObserver(scheduleRefresh);
  const appRoot = document.getElementById('app');
  if (appRoot) observer.observe(appRoot, { childList: true, subtree: true });
  window.addEventListener('pagehide', () => {
    observer.disconnect();
    if (refreshFrame) window.cancelAnimationFrame(refreshFrame);
  }, { once: true });
  scheduleRefresh();
})();
</script>

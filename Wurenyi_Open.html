<head><script type="module">import{default as e}from'https://testingcf.jsdelivr.net/npm/gsap/+esm';var t={675(e,t){t.A=(e,t)=>{const a=e.__vccOpts||e;for(const[e,l]of t)a[e]=l;return a}}};const a={};const l=Vue,n=['昭和二十一年，一月。战败后的第五个月。冬日的东京满目疮痍，防空洞的积水还没干透，上野站前的煤烟和劣质烟草味混杂在一起。占领军的吉普车压过结冰的泥水，新颁布的统制令像废纸一样贴在残存的电线杆上。旧的帝国崩塌了，新的秩序还没建立，复员兵、流民、黑市贩子和暗娼挤在废墟间，依靠黑市的军票和暗巷里的「疲劳蹦」熬过这个冬天。','在京滨十一区的灰色地带，五大组织——愚连队、博徒与的屋，正为了生存与地盘重新划定界线。警察在美军宪兵和黑市巨头之间夹缝求生，而街头的血液比浊酒还要廉价。','你二十五岁，是一个从南方战场活下来的复员兵。你不是什么大人物。你是上野红砖会的头目，带着十八个和你一样走投无路的弟兄，盘踞在上野站西口的小街区。一栋明治末年的红砖楼，地下是妓楼，一楼卖着兑水的密酒，二楼是你们的据点。你靠收保护费和两家破落的赌坊养活手下，在金平组的黑市网络与警视厅经济课的眼皮底下艰难周旋。','这里没有快意恩仇的江湖传说，只有算计到分毫的保护费，和为了一口饭不得不拔出的短刀。你要在残存的「仁义」与见血的「刀剑」之间找到平衡。是成为大组织的附庸，是被警察当成业绩折进苦窑，还是踩着别人的尸骨在这片废墟上建立自己的规矩？','一切的选择，都在你的手里。'],o=[{name:'望月糸子',role:'花月楼妈妈桑',desc:'战中丧夫，独自带大女儿；赁下红砖楼地下经营花月楼。精明练达、护犊极甚，与红砖会是赤裸裸的利害交换，却也藏着几分说不清的温存。',portrait:'https://files.catbox.moe/otnjk7.png'},{name:'望月小夏',role:'糸子之女 · 花月楼帮工',desc:'在妓楼长大，沉默寡言，对红砖会一干人戒心很重。暗地里羡慕街上普通女孩的生活，把「被当作普通人」看得比什么都要紧。',portrait:'https://files.catbox.moe/o3ume6.png'},{name:'佐藤节子',role:'房东寡女',desc:'守寡后回娘家与父亲同住三楼，账目算得极清，对楼里营生厌恶却无可奈何。冷淡外壳下是战后屈辱与丧夫之痛，破开需极大耐心。',portrait:'https://files.catbox.moe/ot7gwk.png'},{name:'朝仓澪',role:'松竹当红女优',desc:'大正十四年生的银幕明星，周旋于片场、应酬与灰色江湖之间。光鲜背后是被名声与势力撕扯的私人生活，是都心线上的另一重诱惑与风险。',portrait:'https://files.catbox.moe/39tofi.png'},{name:'新桥雅代',role:'新桥会会长夫人',desc:'会长新桥庄助之妻，银座社交场的名媛。打倒新桥会之前只可远观；局势倾覆之后，这位夫人的立场与心思将成为新的棋局。',portrait:'https://files.catbox.moe/p23n3h.png'},{name:'鹭宫绫子',role:'男爵家令嬢',desc:'父亲战死、母亲病逝后，被卷入家督、债务与古董寄卖纠纷。她熟悉旧华族礼法和家藏鉴定，却拒绝把自己的未来交给任何新的保护人。',portrait:'https://files.catbox.moe/1s8ghv.png'},{name:'高峰千鹤',role:'国立东京第一医院看护妇',desc:'留任于旧东京第一陆军医院的外科看护妇，熟悉复员伤兵与军用药品。她把救治顺序看得比黑道面子更重，也在追查院内药物流失。',portrait:'https://files.catbox.moe/5q62rw.png'},{name:'中村忍',role:'红砖会组员 · 歌舞伎女形出身的男娘',desc:'南洋复员兵，因女相在军中受尽欺凌。<user>不问出身地将他召入麾下，忠诚里掺着说不清的情愫。白日男装做组员，夜里偶着旧女性和服。',portrait:'https://files.catbox.moe/apbiu7.png'}],r=[{title:'1. 真实的地理与时间流逝',body:'东京被划分为「京滨十一区」。出门办事不能瞬移——坐山手线去新宿、或者步行去阿美横，都会严格扣除对应的时间和车票钱。下车时，时间已经流逝，局势可能已经改变。'},{title:'2. 灰黑产业与地盘经营',body:'你名下拥有的各种各样的产业。你可以去自己的场子查账、招募人手。也可以带人去抢夺其他街区的地盘，在新的地盘上开设新的产业。游戏自带月末自动结算脚本，到了月底，你的产业收入和收上来的保护费会自动进账。'},{title:'3. 威望与警戒度系统',body:'这是你在道上混的「脸面」与「代价」。威望：威望高，黑市买东西能打折，招募小弟时别人纳头便拜，和其他老大谈判也能逼对方让步；威望低，连街边的小贩都敢宰你。警戒度：如果你做事太高调、当街杀人或把保护费逼得太狠，警戒度就会飙升。一旦超过60，警视厅经济课的警察就会来抄你的场子；超过80，他们甚至会随便找个理由把你或你的手下抓进监狱。'},{title:'4. 愚连队管理',body:'你需要管理手下的兄弟。分赃不均、见死不救会导致「平均忠诚」和「平均团结」下降，甚至引发内斗。对于核心骨干，系统会单独记录他们的忠诚和好感。如果你够狠，还能花钱和时间招募培养有去无回的死士——「铁炮玉」。'},{title:'5. 商城系统',body:'你可以在商城里购买名烟名酒、珠宝衣物，这些物品可以赠送他人，也可以自己使用。你也可以购买车辆，车辆越高级，不仅影响驾车的速度，也影响你的威望值。'}],c={class:'greeting-root'},s=['onClick'],i={class:'home-head home-animate'},p={class:'title'},d={class:'subtitle'},m={class:'author'},u={class:'notice home-animate'},k={class:'char-portrait'},f=['src','alt'],h={key:1,class:'char-fallback'},y={class:'char-body'},b={class:'char-head'},g={class:'char-name'},v={class:'char-role'},E={class:'char-desc'},B={class:'block-title'},V={class:'body-text'},N=(0,l.defineComponent)({__name:'App',setup(t){const a=[{id:'home',label:'首页'},{id:'situation',label:'局势'},{id:'characters',label:'人物'},{id:'mechanics',label:'机制'}],N=(0,l.ref)('home'),x=(0,l.ref)(null),w=(0,l.ref)({left:'0px',width:'0px'}),S=(0,l.ref)(null),D=['本角色卡《废墟之上：无仁义之战》由Pleak创作，仅供个人学习、交流与同好游玩之用。不得将本卡搬运至站外平台。严禁任何形式的商业化利用。欢迎进行二改、二创。'];function C(){const e=S.value;if(!e)return;const t=a.findIndex(e=>e.id===N.value),l=e.children[t];l&&(w.value={left:`${l.offsetLeft}px`,width:`${l.offsetWidth}px`})}async function F(){try{const e=SillyTavern.getContext(),t=0,a=e.chat[t],l=1;if(!a?.swipes?.[l])return void toastr.warning('第二开场白尚未配置');a.swipe_id=l,a.mes=a.swipes[l],a.swipe_info?.[l]&&(a.extra={...a.extra??{},...a.swipe_info[l].extra??{}}),await e.saveChat(),await e.reloadCurrentChat()}catch(e){console.error('开场白跳转失败:',e),toastr.error(`跳转失败: ${e.message??e}`)}}return(0,l.onMounted)(async()=>{await(0,l.nextTick)(),C(),e.from('.home-animate',{opacity:0,y:16,duration:.7,stagger:.09,ease:'power2.out'})}),(t,L)=>((0,l.openBlock)(     for (const option of options) {
      try {
        const value = getVariables(option);
        if (value?.stat_data) return value.stat_data;
      } catch (_) {}
    }
    return {};
  };
  const refresh = () => {
    const characters = getStatData()?.角色 ?? {};
    document.querySelectorAll('.char-card').forEach(card => {
      const currentName = card.dataset.jingiRealName || card.querySelector('.char-name')?.textContent?.trim();
      if (!LOCKED.has(currentName)) return;
      card.dataset.jingiRealName = currentName;
      const unlocked = Object.prototype.hasOwnProperty.call(characters, currentName);
      if (unlocked) {
        if (card.classList.contains('jingi-locked') && originals.has(card)) {
          card.innerHTML = originals.get(card);
        }
        card.classList.remove('jingi-locked');
        return;
      }
      if (!originals.has(card)) originals.set(card, card.innerHTML);
      card.classList.add('jingi-locked');
      const portrait = card.querySelector('.char-portrait');
      const name = card.querySelector('.char-name');
      const role = card.querySelector('.char-role');
      const desc = card.querySelector('.char-desc');
      const fallbackPortrait = '<span class="char-fallback">？</span>';
      const fallbackDesc = '此人的名字与来历尚未进入你的视野。随着局势推进，相关情报会在相遇后解锁。';
      if (portrait && portrait.innerHTML !== fallbackPortrait) portrait.innerHTML = fallbackPortrait;
      if (name && name.textContent !== '尚未相识') name.textContent = '尚未相识';
      if (role && role.textContent !== '身份不明') role.textContent = '身份不明';
      if (desc && desc.textContent !== fallbackDesc) desc.textContent = fallbackDesc;
    });
    document.body.classList.add('jingi-unlock-ready');
  };
  const observer = new MutationObserver(refresh);
  observer.observe(document.documentElement, { childList: true, subtree: true });
  const timer = window.setInterval(refresh, 1500);
  window.addEventListener('pagehide', () => {
    observer.disconnect();
    window.clearInterval(timer);
  }, { once: true });
  refresh();
})();
</script>
